<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc — Project Card Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-900: oklch(0.13 0.01 250);
    --surface-800: oklch(0.16 0.01 250);
    --surface-700: oklch(0.2 0.01 250);
    --surface-600: oklch(0.25 0.015 250);
    --surface-500: oklch(0.35 0.02 250);
    --primary-400: oklch(0.65 0.18 270);
    --primary-500: oklch(0.55 0.22 270);
    --primary-600: oklch(0.48 0.22 270);
    --accent-400: oklch(0.72 0.12 185);
    --text-primary: oklch(0.95 0.005 250);
    --text-secondary: oklch(0.7 0.01 250);
    --text-muted: oklch(0.5 0.01 250);
    --border: oklch(0.25 0.01 250);
    --border-subtle: oklch(0.2 0.01 250);
    --border-focus: oklch(0.55 0.22 270);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--surface-900);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }

  h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; }
  .subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2rem; }

  .section-label {
    font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; padding-left: 2px;
  }

  .comparison {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2.5rem;
  }

  .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }

  /* ==================== OLD CARD ==================== */
  .card-old {
    background: var(--surface-800); border: 1px solid var(--border); border-radius: 6px;
    padding: 1.25rem; cursor: pointer; transition: all 150ms ease;
  }
  .card-old:hover { border-color: var(--primary-600); background: var(--surface-700); }
  .card-old .top-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
  .card-old .prefix-icon {
    width: 2.5rem; height: 2.5rem; background: oklch(0.48 0.22 270 / 0.2); border-radius: 0.5rem;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.8rem; color: var(--primary-400); text-transform: uppercase;
  }
  .card-old .chevron { color: var(--text-muted); font-size: 1.2rem; transition: color 150ms; }
  .card-old:hover .chevron { color: var(--primary-400); }
  .card-old .name-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
  .card-old .name { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
  .card-old:hover .name { color: white; }
  .card-old .description {
    font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1rem;
  }
  .card-old .show-paths {
    font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.25rem;
    cursor: pointer; background: none; border: none; font-family: inherit; padding: 0;
  }
  .card-old .show-paths:hover { color: var(--text-secondary); }

  /* ==================== NEW CARD ==================== */
  .card-new {
    background: var(--surface-800); border: 1px solid var(--border); border-radius: 6px;
    padding: 1rem; cursor: pointer; transition: all 200ms ease; display: flex; flex-direction: column;
  }
  .card-new:hover {
    border-color: var(--primary-500); background: var(--surface-700);
    box-shadow: 0 0 0 1px oklch(0.48 0.22 270 / 0.1);
  }

  /* Header row: NAME | ID + path count pill */
  .card-new .card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem;
  }

  .card-new .name-id-row {
    display: flex; align-items: baseline; gap: 0; min-width: 0; overflow: hidden;
  }

  .card-new .project-name {
    font-size: 1.3rem; font-weight: 700; color: var(--primary-400);
    letter-spacing: 0.04em; transition: color 150ms; white-space: nowrap;
    text-transform: uppercase;
  }
  .card-new:hover .project-name { color: oklch(0.72 0.18 270); }

  .card-new .name-id-divider {
    width: 1px; height: 1rem; background: var(--surface-500); margin: 0 0.6rem;
    flex-shrink: 0; align-self: center; opacity: 0.6;
  }

  .card-new .project-id {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 500;
    color: var(--accent-400); letter-spacing: 0.02em; white-space: nowrap;
    opacity: 0.85; align-self: center;
  }

  .card-new .path-count {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.65rem; font-weight: 600;
    background: var(--surface-700); color: var(--text-muted);
    border: 1px solid var(--border-subtle); white-space: nowrap; transition: all 150ms;
    flex-shrink: 0; margin-left: 0.5rem;
  }
  .card-new:hover .path-count { background: var(--surface-600); color: var(--text-secondary); }
  .card-new .path-count svg { width: 0.7rem; height: 0.7rem; opacity: 0.7; }

  .card-new .description {
    font-size: 0.85rem; color: var(--text-secondary); line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1;
  }
  .card-new .description.empty { color: var(--text-muted); font-style: italic; }

  .card-new .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 0.65rem; padding-top: 0.5rem; border-top: 1px solid var(--border-subtle);
  }
  .card-new .show-paths-btn {
    font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.3rem;
    cursor: pointer; background: none; border: none; font-family: inherit; padding: 0.2rem 0; transition: color 150ms;
  }
  .card-new .show-paths-btn:hover { color: var(--primary-400); }
  .card-new .chevron-link {
    color: var(--text-muted); transition: all 150ms; display: flex; align-items: center;
  }
  .card-new:hover .chevron-link { color: var(--primary-400); transform: translateX(2px); }

  .full-preview { margin-top: 2rem; }

  /* ==================== TOOLBAR ==================== */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.75rem; padding: 0 2px;
  }

  .toolbar-group {
    display: flex; align-items: center; gap: 0.35rem;
  }

  .toolbar-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
    background: var(--surface-800); border: 1px solid var(--border); border-radius: 4px;
    padding: 0.35rem 0.6rem; font-size: 0.75rem; font-weight: 500;
    color: var(--text-muted); cursor: pointer; font-family: inherit;
    transition: all 150ms ease; white-space: nowrap;
  }

  .toolbar-btn:hover {
    background: var(--surface-700); color: var(--text-secondary); border-color: var(--surface-500);
  }

  .toolbar-btn.active {
    background: var(--surface-700); color: var(--primary-400);
    border-color: oklch(0.48 0.22 270 / 0.4);
  }

  .toolbar-btn svg { width: 0.85rem; height: 0.85rem; flex-shrink: 0; }

  .toolbar-divider {
    width: 1px; height: 1.1rem; background: var(--border); margin: 0 0.25rem;
  }

  /* ==================== LIST LAYOUT ==================== */
  .card-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .card-new.list-item {
    flex-direction: row; align-items: center; gap: 1rem; padding: 0.65rem 1rem;
  }

  .card-new.list-item .card-header {
    margin-bottom: 0; flex-shrink: 0; min-width: 0; flex: 1;
  }

  .card-new.list-item .description {
    flex: 1; -webkit-line-clamp: 1; margin: 0; min-width: 0;
  }

  .card-new.list-item .card-footer {
    margin-top: 0; padding-top: 0; border-top: none; flex-shrink: 0; gap: 0.75rem;
  }

  .card-new.list-item .card-footer .show-paths-btn { display: none; }

  @media (max-width: 768px) {
    .comparison { grid-template-columns: 1fr; }
    .card-grid { grid-template-columns: 1fr; }
    .card-new.list-item { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<h1>Project Card Redesign — Final</h1>
<p class="subtitle">Teal accent · Large name · Compact padding · NAME | ID layout</p>

<!-- Side by side comparison -->
<div class="comparison">
  <div>
    <div class="section-label">Before (current)</div>
    <div id="oldCards" style="display: flex; flex-direction: column; gap: 1rem;"></div>
  </div>
  <div>
    <div class="section-label">After (redesigned)</div>
    <div id="newCardsPreview" style="display: flex; flex-direction: column; gap: 1rem;"></div>
  </div>
</div>

<!-- Full interactive preview -->
<div class="full-preview">
  <div class="section-label">Full Preview (new design)</div>

  <div class="toolbar">
    <div class="toolbar-group">
      <button class="toolbar-btn active" id="sortBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5h10M11 9h7M11 13h4M3 17l3 3 3-3M6 18V4"/>
        </svg>
        <span id="sortLabel">A–Z</span>
      </button>
    </div>
    <div class="toolbar-group">
      <button class="toolbar-btn active" id="gridBtn" type="button" title="Grid view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <span class="toolbar-divider"></span>
      <button class="toolbar-btn" id="listBtn" type="button" title="List view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="card-grid" id="fullGrid"></div>
</div>

<script>
  var projects = [
    { name: 'bacstack', prefix: 'BS', id: 'BACSTACK-00BY', description: 'BACnet protocol stack implementation with modern Go interfaces and virtual device support', paths: 3 },
    { name: 'arc', prefix: 'AR', id: 'ARC-00BZ', description: 'Central issue tracking server for AI-assisted coding workflows', paths: 2 },
    { name: 'sentiolabs', prefix: 'SL', id: 'SENTIOLABS-00C1', description: 'Company-wide monorepo for shared libraries, tooling, and infrastructure', paths: 5 },
    { name: 'homelab', prefix: 'HL', id: 'HOMELAB-00C2', description: '', paths: 0 },
    { name: 'dotfiles', prefix: 'DF', id: 'DOTFILES-00C3', description: 'Personal development environment configuration and shell scripts', paths: 1 },
    { name: 'claude-plugins', prefix: 'CP', id: 'CPLUGINS-00C4', description: 'Custom Claude Code plugins for enhanced AI-assisted development workflows', paths: 4 },
  ];

  var sortAsc = true;
  var layoutMode = 'grid'; // 'grid' or 'list'

  function getSortedProjects() {
    return projects.slice().sort(function(a, b) {
      var cmp = a.name.localeCompare(b.name);
      return sortAsc ? cmp : -cmp;
    });
  }

  function createOldCard(project) {
    var card = document.createElement('div');
    card.className = 'card-old';

    var topRow = document.createElement('div');
    topRow.className = 'top-row';
    var prefixIcon = document.createElement('div');
    prefixIcon.className = 'prefix-icon';
    prefixIcon.textContent = project.prefix;
    var chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '\u203A';
    topRow.appendChild(prefixIcon);
    topRow.appendChild(chevron);
    card.appendChild(topRow);

    var nameRow = document.createElement('div');
    nameRow.className = 'name-row';
    var name = document.createElement('span');
    name.className = 'name';
    name.textContent = project.name;
    nameRow.appendChild(name);
    card.appendChild(nameRow);

    var desc = document.createElement('p');
    desc.className = 'description';
    desc.textContent = project.description || 'No description';
    if (!project.description) desc.style.color = 'var(--text-muted)';
    card.appendChild(desc);

    var pathsDiv = document.createElement('div');
    pathsDiv.style.marginTop = '0.5rem';
    var showBtn = document.createElement('button');
    showBtn.className = 'show-paths';
    showBtn.textContent = '\u203A Show paths';
    pathsDiv.appendChild(showBtn);
    card.appendChild(pathsDiv);

    return card;
  }

  function createNewCard(project) {
    var pathLabel = project.paths === 1 ? 'workspace' : 'workspaces';

    var card = document.createElement('div');
    card.className = 'card-new';

    // Header: name | id  +  path-count pill
    var header = document.createElement('div');
    header.className = 'card-header';

    var nameIdRow = document.createElement('div');
    nameIdRow.className = 'name-id-row';

    var nameEl = document.createElement('span');
    nameEl.className = 'project-name';
    nameEl.textContent = project.name;
    nameIdRow.appendChild(nameEl);

    var divider = document.createElement('span');
    divider.className = 'name-id-divider';
    nameIdRow.appendChild(divider);

    var idEl = document.createElement('span');
    idEl.className = 'project-id';
    idEl.textContent = project.id;
    nameIdRow.appendChild(idEl);

    header.appendChild(nameIdRow);

    if (project.paths > 0) {
      var pathCount = document.createElement('span');
      pathCount.className = 'path-count';

      var folderSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      folderSvg.setAttribute('viewBox', '0 0 24 24');
      folderSvg.setAttribute('fill', 'none');
      folderSvg.setAttribute('stroke', 'currentColor');
      folderSvg.setAttribute('stroke-width', '2.5');
      folderSvg.setAttribute('stroke-linecap', 'round');
      folderSvg.setAttribute('stroke-linejoin', 'round');
      var pathD = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      pathD.setAttribute('d', 'M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z');
      folderSvg.appendChild(pathD);

      pathCount.appendChild(folderSvg);
      pathCount.appendChild(document.createTextNode(project.paths + ' ' + pathLabel));
      header.appendChild(pathCount);
    }

    card.appendChild(header);

    // Description
    var desc = document.createElement('p');
    desc.className = 'description' + (project.description ? '' : ' empty');
    desc.textContent = project.description || 'No description';
    card.appendChild(desc);

    // Footer
    var footer = document.createElement('div');
    footer.className = 'card-footer';

    var showBtn = document.createElement('button');
    showBtn.className = 'show-paths-btn';
    showBtn.onclick = function(e) { e.stopPropagation(); };

    var chevSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    chevSvg.setAttribute('width', '10');
    chevSvg.setAttribute('height', '10');
    chevSvg.setAttribute('viewBox', '0 0 24 24');
    chevSvg.setAttribute('fill', 'currentColor');
    var chevPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    chevPath.setAttribute('d', 'M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z');
    chevSvg.appendChild(chevPath);

    showBtn.appendChild(chevSvg);
    showBtn.appendChild(document.createTextNode('Show paths'));
    footer.appendChild(showBtn);

    var chevLink = document.createElement('span');
    chevLink.className = 'chevron-link';
    var linkSvg = chevSvg.cloneNode(true);
    linkSvg.setAttribute('width', '16');
    linkSvg.setAttribute('height', '16');
    chevLink.appendChild(linkSvg);
    footer.appendChild(chevLink);

    card.appendChild(footer);

    return card;
  }

  function createListCard(project) {
    var card = createNewCard(project);
    card.classList.add('list-item');
    return card;
  }

  function render() {
    var sorted = getSortedProjects();

    // Old cards (first 2)
    var oldContainer = document.getElementById('oldCards');
    oldContainer.replaceChildren();
    sorted.slice(0, 2).forEach(function(p) { oldContainer.appendChild(createOldCard(p)); });

    // New cards preview (first 2)
    var newPreview = document.getElementById('newCardsPreview');
    newPreview.replaceChildren();
    sorted.slice(0, 2).forEach(function(p) { newPreview.appendChild(createNewCard(p)); });

    // Full preview — grid or list
    var grid = document.getElementById('fullGrid');
    grid.replaceChildren();

    if (layoutMode === 'grid') {
      grid.className = 'card-grid';
      sorted.forEach(function(p) { grid.appendChild(createNewCard(p)); });
    } else {
      grid.className = 'card-list';
      sorted.forEach(function(p) { grid.appendChild(createListCard(p)); });
    }

    // Update button states
    document.getElementById('sortLabel').textContent = sortAsc ? 'A\u2013Z' : 'Z\u2013A';
    document.getElementById('gridBtn').classList.toggle('active', layoutMode === 'grid');
    document.getElementById('listBtn').classList.toggle('active', layoutMode === 'list');
  }

  document.getElementById('sortBtn').addEventListener('click', function() {
    sortAsc = !sortAsc;
    render();
  });

  document.getElementById('gridBtn').addEventListener('click', function() {
    layoutMode = 'grid';
    render();
  });

  document.getElementById('listBtn').addEventListener('click', function() {
    layoutMode = 'list';
    render();
  });

  render();
</script>

</body>
</html>
