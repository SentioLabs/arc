services:
  arc-test-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arc-test-server
    ports:
      - "7433:7432"
    tmpfs:
      - /data:uid=1000,gid=1000
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7432/health"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s
