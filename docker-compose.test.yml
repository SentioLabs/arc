services:
  # Self-contained integration tests: server + tests in one container.
  # No host filesystem coupling — everything runs inside Docker.
  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.integration
    container_name: arc-integration-tests
    tmpfs:
      - /tmp
      - /data
    environment:
      - TZ=UTC
      - ARC_SERVER=http://127.0.0.1:7432
    profiles:
      - integration

  # Standalone server for playwright E2E tests (run from host).
  arc-test-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arc-test-server
    ports:
      - "7433:7432"
    tmpfs:
      - /data:uid=1000,gid=1000
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7432/health"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s
    profiles:
      - playwright
