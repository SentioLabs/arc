openapi: 3.0.3
info:
  title: Arc Issue Tracker API
  description: |
    Central issue tracking server for AI-assisted coding workflows.
    Arc provides project-scoped issue management with dependency tracking,
    labels, comments, and audit trails.
  version: 1.0.0
  contact:
    name: SentioLabs
    url: https://github.com/sentiolabs/arc

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: projects
    description: Project management
  - name: issues
    description: Issue CRUD and lifecycle operations
  - name: ready
    description: Ready work queue and blocked issues
  - name: dependencies
    description: Issue dependency management
  - name: labels
    description: Label management
  - name: config
    description: Arc configuration management
  - name: comments
    description: Comments and audit events
  - name: teams
    description: Agent team context and role grouping
  - name: ai-sessions
    description: AI session and agent observability
  - name: plans
    description: Ephemeral plan review artifacts
  - name: shares
    description: Author-side keyring of paste shares created on this machine

paths:
  # ====================
  # Projects
  # ====================
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      responses:
        "204":
          description: Project deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/stats:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get project statistics
      responses:
        "200":
          description: Project statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Statistics"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Issues
  # ====================
  /projects/{projectId}/issues:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: listIssues
      tags: [issues]
      summary: List issues in project
      parameters:
        - name: status
          in: query
          description: Filter by status (supports multiple values)
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Status"
          style: form
          explode: true
        - name: type
          in: query
          description: Filter by issue type (supports multiple values)
          schema:
            type: array
            items:
              $ref: "#/components/schemas/IssueType"
          style: form
          explode: true
        - name: priority
          in: query
          description: Filter by priority (supports multiple values, 0-4)
          schema:
            type: array
            items:
              type: integer
              minimum: 0
              maximum: 4
          style: form
          explode: true
        - name: ai_session_id
          in: query
          description: Filter by AI session ID
          schema:
            type: string
        - name: parent_id
          in: query
          required: false
          description: Filter by parent issue ID (returns children via parent-child dependency)
          schema:
            type: string
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum results to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIssues"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createIssue
      tags: [issues]
      summary: Create a new issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Issue created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/IssueId"

    get:
      operationId: getIssueByID
      tags: [issues]
      summary: Get issue by globally-unique ID
      description: >
        Retrieves an issue by its globally-unique ID without requiring project context.
        Use this endpoint when you have an issue ID but don't know or need the project.
      parameters:
        - name: details
          in: query
          description: Include full details (dependencies, comments, labels)
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Issue"
                  - $ref: "#/components/schemas/IssueDetails"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    get:
      operationId: getIssue
      tags: [issues]
      summary: Get issue by ID within a project
      description: >
        Retrieves an issue by ID within a project-scoped route. Validates the
        issue belongs to the specified project.
      parameters:
        - name: details
          in: query
          description: Include full details (dependencies, comments, labels)
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Issue"
                  - $ref: "#/components/schemas/IssueDetails"
        "403":
          description: Access denied (issue does not belong to project)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: updateIssue
      tags: [issues]
      summary: Update issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueRequest"
      responses:
        "200":
          description: Issue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteIssue
      tags: [issues]
      summary: Delete issue
      responses:
        "204":
          description: Issue deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}/close:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    post:
      operationId: closeIssue
      tags: [issues]
      summary: Close an issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseIssueRequest"
      responses:
        "200":
          description: Issue closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}/reopen:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    post:
      operationId: reopenIssue
      tags: [issues]
      summary: Reopen a closed issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      responses:
        "200":
          description: Issue reopened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Ready & Blocked
  # ====================
  /projects/{projectId}/ready:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: getReadyWork
      tags: [ready]
      summary: Get issues ready to work on (no blocking dependencies)
      parameters:
        - name: type
          in: query
          description: Filter by issue type
          schema:
            $ref: "#/components/schemas/IssueType"
        - name: priority
          in: query
          description: Filter by priority (0-4)
          schema:
            type: integer
            minimum: 0
            maximum: 4
        - name: limit
          in: query
          description: Maximum results to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: sort
          in: query
          description: |
            Sort policy for ready issues:
            - hybrid (default): Recent issues (<48h) sorted by priority/rank, older issues by age
            - priority: Always sort by priority → rank → created_at
            - oldest: Always sort by created_at (oldest first, for backlog clearing)
          schema:
            type: string
            enum: [hybrid, priority, oldest]
            default: hybrid
      responses:
        "200":
          description: List of ready issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/blocked:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: getBlockedIssues
      tags: [ready]
      summary: Get blocked issues
      parameters:
        - name: limit
          in: query
          description: Maximum results to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: List of blocked issues with blocking info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedIssue"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Team Context
  # ====================
  /projects/{projectId}/team-context:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: getTeamContext
      tags: [teams]
      summary: Get issues grouped by teammate role labels
      description: |
        Returns issues grouped by their `teammate:*` labels. When an epic_id is
        provided, only children of that epic (via parent-child dependency) are
        included. Without epic_id, all non-closed issues with teammate labels
        in the project are returned.
      parameters:
        - name: epic_id
          in: query
          description: Optional epic ID to scope to children of a specific epic
          schema:
            type: string
      responses:
        "200":
          description: Team context with issues grouped by role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamContext"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # AI Sessions
  # ====================
  /projects/{projectId}/ai/sessions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      operationId: listAISessions
      tags: [ai-sessions]
      summary: List AI sessions for a project
      parameters:
        - name: limit
          in: query
          description: Maximum results to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of AI sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAISessions"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createAISession
      tags: [ai-sessions]
      summary: Create a new AI session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAISessionRequest"
      responses:
        "201":
          description: AI session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/ai/sessions/batch-delete:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    post:
      operationId: batchDeleteAISessions
      tags: [ai-sessions]
      summary: Batch delete AI sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchDeleteAISessionsRequest"
      responses:
        "200":
          description: Batch delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteAISessionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/ai/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: sessionId
        in: path
        required: true
        description: AI session ID
        schema:
          type: string

    get:
      operationId: getAISession
      tags: [ai-sessions]
      summary: Get AI session by ID
      responses:
        "200":
          description: AI session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISessionResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteAISession
      tags: [ai-sessions]
      summary: Delete AI session
      responses:
        "204":
          description: AI session deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/ai/sessions/{sessionId}/transcript:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: sessionId
        in: path
        required: true
        description: AI session ID
        schema:
          type: string

    get:
      operationId: getSessionTranscript
      tags: [ai-sessions]
      summary: Get AI session transcript
      responses:
        "200":
          description: Session transcript content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/ai/sessions/{sessionId}/agents:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: sessionId
        in: path
        required: true
        description: AI session ID
        schema:
          type: string

    get:
      operationId: listAIAgents
      tags: [ai-sessions]
      summary: List AI agents for a session
      responses:
        "200":
          description: List of AI agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AIAgentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createAIAgent
      tags: [ai-sessions]
      summary: Create a new AI agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAIAgentRequest"
      responses:
        "201":
          description: AI agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/ai/sessions/{sessionId}/agents/{agentId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: sessionId
        in: path
        required: true
        description: AI session ID
        schema:
          type: string
      - name: agentId
        in: path
        required: true
        description: AI agent ID
        schema:
          type: string

    get:
      operationId: getAIAgent
      tags: [ai-sessions]
      summary: Get AI agent by ID
      responses:
        "200":
          description: AI agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAgentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/ai/sessions/{sessionId}/agents/{agentId}/transcript:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: sessionId
        in: path
        required: true
        description: AI session ID
        schema:
          type: string
      - name: agentId
        in: path
        required: true
        description: AI agent ID
        schema:
          type: string

    get:
      operationId: getAgentTranscript
      tags: [ai-sessions]
      summary: Get AI agent transcript
      responses:
        "200":
          description: Agent transcript content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Dependencies
  # ====================
  /projects/{projectId}/issues/{issueId}/deps:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    get:
      operationId: getDependencies
      tags: [dependencies]
      summary: Get issue dependencies and dependents
      responses:
        "200":
          description: Dependencies and dependents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyGraph"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: addDependency
      tags: [dependencies]
      summary: Add a dependency to an issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDependencyRequest"
      responses:
        "201":
          description: Dependency added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dependency"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}/deps/{dependsOnId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"
      - name: dependsOnId
        in: path
        required: true
        description: ID of the dependency to remove
        schema:
          type: string

    delete:
      operationId: removeDependency
      tags: [dependencies]
      summary: Remove a dependency from an issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      responses:
        "204":
          description: Dependency removed
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Labels (global)
  # ====================
  /labels:
    get:
      operationId: listLabels
      tags: [labels]
      summary: List all global labels
      responses:
        "200":
          description: List of labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createLabel
      tags: [labels]
      summary: Create a new label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelRequest"
      responses:
        "201":
          description: Label created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /labels/{labelName}:
    parameters:
      - name: labelName
        in: path
        required: true
        description: Label name
        schema:
          type: string

    put:
      operationId: updateLabel
      tags: [labels]
      summary: Update a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Label updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteLabel
      tags: [labels]
      summary: Delete a label
      responses:
        "204":
          description: Label deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Config (singleton)
  # ====================
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get the current arc configuration
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: putConfig
      tags: [config]
      summary: Replace the arc configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Config"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Shares (author keyring)
  # ====================
  /shares:
    get:
      operationId: listShares
      tags: [shares]
      summary: List authored shares from the local keyring
      responses:
        "200":
          description: List of shares (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Share"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: upsertShare
      tags: [shares]
      summary: Insert or replace a share keyring entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertShareRequest"
      responses:
        "200":
          description: Share stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Share"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /shares/{shareId}:
    parameters:
      - name: shareId
        in: path
        required: true
        description: Share ID (server-generated by the paste host)
        schema:
          type: string

    get:
      operationId: getShare
      tags: [shares]
      summary: Get a single share keyring entry
      responses:
        "200":
          description: Share record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Share"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteShare
      tags: [shares]
      summary: Remove a share from the keyring (idempotent)
      responses:
        "204":
          description: Share removed (or absent — same response)
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Issue-Label Associations (project-scoped)
  # ====================
  /projects/{projectId}/issues/{issueId}/labels:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    post:
      operationId: addLabelToIssue
      tags: [labels]
      summary: Add a label to an issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLabelToIssueRequest"
      responses:
        "204":
          description: Label added to issue
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}/labels/{labelName}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"
      - name: labelName
        in: path
        required: true
        description: Label name to remove
        schema:
          type: string

    delete:
      operationId: removeLabelFromIssue
      tags: [labels]
      summary: Remove a label from an issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      responses:
        "204":
          description: Label removed from issue
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Comments & Events
  # ====================
  /projects/{projectId}/issues/{issueId}/comments:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    get:
      operationId: getComments
      tags: [comments]
      summary: Get comments for an issue
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: addComment
      tags: [comments]
      summary: Add a comment to an issue
      parameters:
        - $ref: "#/components/parameters/ActorHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}/comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"
      - name: commentId
        in: path
        required: true
        description: Comment ID
        schema:
          type: integer
          format: int64

    put:
      operationId: updateComment
      tags: [comments]
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "204":
          description: Comment updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      responses:
        "204":
          description: Comment deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{projectId}/issues/{issueId}/events:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/IssueId"

    get:
      operationId: getEvents
      tags: [comments]
      summary: Get audit events for an issue
      parameters:
        - name: limit
          in: query
          description: Maximum events to return
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ====================
  # Plans (ephemeral review artifacts, not project-scoped)
  # ====================
  /plans:
    post:
      operationId: createPlan
      tags: [plans]
      summary: Register an ephemeral plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /plans/{planId}:
    parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get plan metadata and file content
      responses:
        "200":
          description: Plan with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanWithContent"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: updatePlanContent
      tags: [plans]
      summary: Update plan file content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanContentRequest"
      responses:
        "200":
          description: Content updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanWithContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deletePlan
      tags: [plans]
      summary: Delete plan and its comments
      responses:
        "204":
          description: Plan deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /plans/{planId}/status:
    parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updatePlanStatus
      tags: [plans]
      summary: Update plan status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /plans/{planId}/comments:
    parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listPlanComments
      tags: [plans]
      summary: List plan review comments
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanComment"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createPlanComment
      tags: [plans]
      summary: Add a review comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanComment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: Project ID
      schema:
        type: string

    IssueId:
      name: issueId
      in: path
      required: true
      description: Issue ID
      schema:
        type: string

    ActorHeader:
      name: X-Actor
      in: header
      description: User performing the action (defaults to "anonymous")
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # ====================
    # Core Schemas
    # ====================
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message

    Status:
      type: string
      enum:
        - open
        - in_progress
        - blocked
        - deferred
        - closed

    IssueType:
      type: string
      enum:
        - bug
        - feature
        - task
        - epic
        - chore

    DependencyType:
      type: string
      enum:
        - blocks
        - parent-child
        - related
        - discovered-from

    EventType:
      type: string
      enum:
        - created
        - updated
        - status_changed
        - commented
        - closed
        - reopened
        - dependency_added
        - dependency_removed
        - label_added
        - label_removed

    # ====================
    # Project Schemas
    # ====================
    Project:
      type: object
      required:
        - id
        - name
        - prefix
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique project ID (e.g., "proj-a1b2")
        name:
          type: string
          description: Display name
          maxLength: 100
        path:
          type: string
          description: Optional associated directory path
        description:
          type: string
          description: Project description
        prefix:
          type: string
          description: Issue ID prefix (e.g., "bd")
          maxLength: 10
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required:
        - name
        - prefix
      properties:
        name:
          type: string
          description: Display name
          maxLength: 100
        path:
          type: string
          description: Optional associated directory path
        description:
          type: string
          description: Project description
        prefix:
          type: string
          description: Issue ID prefix
          maxLength: 10

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          description: New display name
          maxLength: 100
        path:
          type: string
          description: New associated directory path
        description:
          type: string
          description: New description

    Statistics:
      type: object
      required:
        - project_id
        - total_issues
        - open_issues
        - in_progress_issues
        - closed_issues
        - blocked_issues
        - deferred_issues
        - ready_issues
      properties:
        project_id:
          type: string
        total_issues:
          type: integer
        open_issues:
          type: integer
        in_progress_issues:
          type: integer
        closed_issues:
          type: integer
        blocked_issues:
          type: integer
        deferred_issues:
          type: integer
        ready_issues:
          type: integer
        avg_lead_time_hours:
          type: number
          format: double

    # ====================
    # Issue Schemas
    # ====================
    Issue:
      type: object
      required:
        - id
        - project_id
        - title
        - status
        - priority
        - issue_type
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique issue ID
        project_id:
          type: string
        title:
          type: string
          maxLength: 500
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        priority:
          type: integer
          minimum: 0
          maximum: 4
          description: "0 (critical) - 4 (backlog)"
        rank:
          type: integer
          description: "0 = unranked (sorts last), 1+ = lower rank = work on first"
        issue_type:
          $ref: "#/components/schemas/IssueType"
        ai_session_id:
          type: string
          description: AI coding session UUID (e.g., Claude Code session ID)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
        close_reason:
          type: string
        external_ref:
          type: string
          description: External reference (e.g., "gh-9", "jira-ABC")
        labels:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/Dependency"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"

    IssueDetails:
      allOf:
        - $ref: "#/components/schemas/Issue"
        - type: object
          properties:
            dependents:
              type: array
              items:
                $ref: "#/components/schemas/Dependency"

    BlockedIssue:
      allOf:
        - $ref: "#/components/schemas/Issue"
        - type: object
          required:
            - blocked_by_count
            - blocked_by
          properties:
            blocked_by_count:
              type: integer
            blocked_by:
              type: array
              items:
                type: string

    PaginatedIssues:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    PaginatedAISessions:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AISessionResponse"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ====================
    # Team Context Schemas
    # ====================
    TeamContext:
      type: object
      required:
        - project
        - roles
      properties:
        project:
          type: string
          description: Project ID
        epic:
          $ref: "#/components/schemas/TeamContextEpic"
        roles:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/TeamContextRole"
          description: Issues grouped by teammate role name

    TeamContextEpic:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: string

    TeamContextRole:
      type: object
      required:
        - issues
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/TeamContextIssue"

    TeamContextIssue:
      type: object
      required:
        - id
        - title
        - priority
        - status
        - type
      properties:
        id:
          type: string
        title:
          type: string
        priority:
          type: integer
          minimum: 0
          maximum: 4
        status:
          type: string
        type:
          type: string
        deps:
          type: array
          items:
            type: string
          description: IDs of issues this depends on

    CreateIssueRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        priority:
          type: integer
          minimum: 0
          maximum: 4
          default: 2
        issue_type:
          $ref: "#/components/schemas/IssueType"
        ai_session_id:
          type: string
          description: AI coding session UUID
        external_ref:
          type: string

    UpdateIssueRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        priority:
          type: integer
          minimum: 0
          maximum: 4
        issue_type:
          $ref: "#/components/schemas/IssueType"
        ai_session_id:
          type: string
          description: AI coding session UUID
        external_ref:
          type: string

    CloseIssueRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for closing

    # ====================
    # Dependency Schemas
    # ====================
    Dependency:
      type: object
      required:
        - issue_id
        - depends_on_id
        - type
        - created_at
      properties:
        issue_id:
          type: string
        depends_on_id:
          type: string
        type:
          $ref: "#/components/schemas/DependencyType"
        created_at:
          type: string
          format: date-time
        created_by:
          type: string

    DependencyGraph:
      type: object
      required:
        - dependencies
        - dependents
      properties:
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/Dependency"
        dependents:
          type: array
          items:
            $ref: "#/components/schemas/Dependency"

    AddDependencyRequest:
      type: object
      required:
        - depends_on_id
        - type
      properties:
        depends_on_id:
          type: string
          description: ID of the issue this depends on
        type:
          $ref: "#/components/schemas/DependencyType"

    # ====================
    # Label Schemas
    # ====================
    Label:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        color:
          type: string
          description: Hex color code (e.g., "#ff0000")
        description:
          type: string

    CreateLabelRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        color:
          type: string
        description:
          type: string

    UpdateLabelRequest:
      type: object
      properties:
        color:
          type: string
        description:
          type: string

    AddLabelToIssueRequest:
      type: object
      required:
        - label
      properties:
        label:
          type: string

    # ====================
    # Share Schemas
    # ====================
    Share:
      type: object
      required: [id, kind, url, key_b64url, edit_token, created_at]
      properties:
        id:
          type: string
        kind:
          $ref: "#/components/schemas/ShareKind"
        url:
          type: string
        key_b64url:
          type: string
        edit_token:
          type: string
        plan_file:
          type: string
        created_at:
          type: string
          format: date-time
    ShareKind:
      type: string
      enum: [local, shared]
    UpsertShareRequest:
      type: object
      required: [id, kind, url, key_b64url, edit_token]
      properties:
        id:
          type: string
        kind:
          $ref: "#/components/schemas/ShareKind"
        url:
          type: string
        key_b64url:
          type: string
        edit_token:
          type: string
        plan_file:
          type: string

    # ====================
    # Comment Schemas
    # ====================
    Comment:
      type: object
      required:
        - id
        - issue_id
        - author
        - text
        - created_at
      properties:
        id:
          type: integer
          format: int64
        issue_id:
          type: string
        author:
          type: string
        text:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AddCommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string

    UpdateCommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string

    # ====================
    # Event Schemas
    # ====================
    Event:
      type: object
      required:
        - id
        - issue_id
        - event_type
        - actor
        - created_at
      properties:
        id:
          type: integer
          format: int64
        issue_id:
          type: string
        event_type:
          $ref: "#/components/schemas/EventType"
        actor:
          type: string
        old_value:
          type: string
        new_value:
          type: string
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    # ====================
    # AI Session Schemas
    # ====================
    AISessionResponse:
      type: object
      required:
        - id
        - project_id
        - transcript_path
        - started_at
      properties:
        id:
          type: string
          description: Unique AI session ID
        project_id:
          type: string
          description: Project ID this session belongs to
        transcript_path:
          type: string
          description: Path to the session transcript file
        cwd:
          type: string
          description: Working directory for the session
        started_at:
          type: string
          format: date-time
        agent_summary:
          type: object
          description: Aggregated agent status counts for this session
          properties:
            agent_count:
              type: integer
              description: Total number of agents in this session
            running_count:
              type: integer
              description: Number of agents currently running
            completed_count:
              type: integer
              description: Number of agents that completed successfully
            error_count:
              type: integer
              description: Number of agents that ended with an error

    CreateAISessionRequest:
      type: object
      required:
        - id
        - transcript_path
      properties:
        id:
          type: string
          description: AI session ID
        transcript_path:
          type: string
          description: Path to the session transcript file
        cwd:
          type: string
          description: Working directory for the session
        started_at:
          type: string
          format: date-time
          description: Session start time (defaults to current time)

    AIAgentResponse:
      type: object
      required:
        - id
        - session_id
        - status
        - created_at
      properties:
        id:
          type: string
          description: Unique AI agent ID
        session_id:
          type: string
          description: Parent session ID
        description:
          type: string
          description: Agent task description
        prompt:
          type: string
          description: Agent prompt text
        agent_type:
          type: string
          description: Type of agent (e.g., "task", "code")
        model:
          type: string
          description: AI model used
        status:
          type: string
          description: Agent status (running, completed, error)
        duration_ms:
          type: integer
          description: Duration in milliseconds
        total_tokens:
          type: integer
          description: Total tokens consumed
        tool_use_count:
          type: integer
          description: Number of tool uses
        created_at:
          type: string
          format: date-time

    CreateAIAgentRequest:
      type: object
      required:
        - id
        - session_id
      properties:
        id:
          type: string
          description: AI agent ID
        session_id:
          type: string
          description: Parent session ID
        description:
          type: string
          description: Agent task description
        prompt:
          type: string
          description: Agent prompt text
        agent_type:
          type: string
          description: Type of agent
        model:
          type: string
          description: AI model used
        status:
          type: string
          description: Agent status (defaults to "running")

    BatchDeleteAISessionsRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          items:
            type: string
          description: List of AI session IDs to delete

    BatchDeleteAISessionsResponse:
      type: object
      properties:
        deleted:
          type: integer
          description: Number of sessions deleted

    TranscriptResponse:
      type: array
      items:
        type: object
        additionalProperties: true
      description: Array of transcript entries

    # ====================
    # Config Schemas
    # ====================
    Config:
      type: object
      required: [cli, server, share, updates]
      properties:
        cli:
          $ref: "#/components/schemas/CLIConfig"
        server:
          $ref: "#/components/schemas/ServerConfig"
        share:
          $ref: "#/components/schemas/ShareConfig"
        updates:
          $ref: "#/components/schemas/UpdatesConfig"

    CLIConfig:
      type: object
      properties:
        server:
          type: string
          description: URL the CLI uses to talk to the arc server.

    ServerConfig:
      type: object
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 65535
        db_path:
          type: string

    ShareConfig:
      type: object
      properties:
        author:
          type: string
        server:
          type: string

    UpdatesConfig:
      type: object
      properties:
        channel:
          type: string
          enum: [stable, rc, nightly]

    ConfigResponse:
      type: object
      required: [cli, server, share, updates, meta]
      allOf:
        - $ref: "#/components/schemas/Config"
        - type: object
          properties:
            meta:
              type: object
              required: [path, requires_restart]
              properties:
                path:
                  type: string
                requires_restart:
                  type: array
                  items:
                    type: string

    ConfigValidationError:
      type: object
      required: [errors]
      properties:
        errors:
          type: object
          additionalProperties:
            type: string

    # ====================
    # Plan Schemas
    # ====================
    PlanStatus:
      type: string
      enum: [draft, in_review, approved, rejected]

    Plan:
      type: object
      required: [id, file_path, status, created_at, updated_at]
      properties:
        id:
          type: string
          description: Unique plan ID (plan.xxxxx format)
        file_path:
          type: string
          description: Relative path to the plan markdown file
        status:
          $ref: "#/components/schemas/PlanStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PlanWithContent:
      allOf:
        - $ref: "#/components/schemas/Plan"
        - type: object
          properties:
            content:
              type: string
              description: Markdown content read from the plan file

    PlanComment:
      type: object
      required: [id, plan_id, content, created_at]
      properties:
        id:
          type: string
        plan_id:
          type: string
        line_number:
          type: integer
          nullable: true
          description: Line number anchor (null for overall feedback)
        content:
          type: string
        created_at:
          type: string
          format: date-time

    CreatePlanRequest:
      type: object
      required: [file_path]
      properties:
        file_path:
          type: string

    UpdatePlanContentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    UpdatePlanStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/PlanStatus"

    CreatePlanCommentRequest:
      type: object
      required: [content]
      properties:
        line_number:
          type: integer
          nullable: true
        content:
          type: string
